<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>相关相册 - 3图</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            -webkit-text-size-adjust: 100%;
        }
        body {
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
            padding: 15px 0;
        }
        .photo-grid-container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }
        .photo-row {
            display: flex;
            flex-direction: row;
            flex-wrap: nowrap; 
            gap: 8px; /* 三图紧凑型手机端间距 */
            padding: 0 15px;
            width: 100%;
        }
        .photo-item {
            flex: 1;
            width: 0;
            aspect-ratio: 1 / 1;
            border-radius: 6px;
            overflow: hidden;
            background-color: #f2f2f7;
            cursor: pointer;
            position: relative;
        }
        .photo-item:active {
            opacity: 0.8;
        }
        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        /* 大图遮罩 */
        .lightbox-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.98);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease-out;
        }
        .lightbox-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .lightbox-img {
            width: auto;
            height: auto;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transform: scale(0.9);
            transition: transform 0.2s ease-out;
        }
        .lightbox-overlay.active .lightbox-img {
            transform: scale(1);
        }
    </style>
</head>
<body>

    <div class="photo-grid-container">
        <div class="photo-row">
            <div class="photo-item" onclick="openLightbox(this)">
                <img src="pic2.jpg" alt="照片1" onerror="this.src='https://via.placeholder.com/300?text=fengmian11'">
            </div>
            <div class="photo-item" onclick="openLightbox(this)">
                <img src="pic3.jpg" alt="照片2" onerror="this.src='https://via.placeholder.com/300?text=fengmian2'">
            </div>
            <div class="photo-item" onclick="openLightbox(this)">
                <img src="fengmian3.jpg" alt="照片3" onerror="this.src='https://via.placeholder.com/300?text=fengmian3'">
            </div>
        </div>
    </div>

    <div id="lightbox" class="lightbox-overlay" onclick="closeLightbox()">
        <img id="lightbox-img" class="lightbox-img" src="" alt="大图预览">
    </div>

    <script>
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');

        function openLightbox(element) {
            const targetSrc = element.querySelector('img').src;
            lightboxImg.src = targetSrc;
            lightbox.classList.add('active');
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
        }
    </script>

</body>
</html>
