<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>搜索引擎</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f2f2f2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .logo {
            font-size: 40px;
            font-weight: bold;
            margin-bottom: 30px;
            color: #333;
            text-align: center;
        }

        .search-container {
            position: relative;
            width: 100%;
            max-width: 550px;
            box-sizing: border-box;
        }

        .search-input {
            width: 100%;
            padding: 14px 20px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 24px;
            outline: none;
            box-sizing: border-box;
            transition: box-shadow 0.2s;
            -webkit-appearance: none;
        }

        .search-input:focus {
            box-shadow: 0 1px 6px rgba(32,33,36,0.28);
            border-color: rgba(223,225,229,0);
        }

        .history-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background-color: #fff;
            border: 1px solid #ccc;
            border-top: none;
            border-radius: 0 0 16px 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-height: 320px;
            overflow-y: auto;
            display: none; 
            z-index: 1000;
            margin-top: -5px;
            padding-top: 10px;
        }

        .history-item {
            padding: 14px 20px;
            font-size: 15px;
            cursor: pointer;
            color: #555;
            display: flex;
            justify-content: space-between;
            align-items: center;
            word-break: break-all; 
        }

        .history-item:hover {
            background-color: #f5f5f5;
        }

        /* 特殊样式：专门给张卫国三个结果用的标记样式 */
        .result-badge {
            font-size: 11px;
            background-color: #e8f0fe;
            color: #1a73e8;
            padding: 2px 6px;
            border-radius: 4px;
            margin-right: 8px;
            flex-shrink: 0;
        }

        .delete-btn {
            color: #999;
            font-size: 14px;
            padding: 0 10px;
            cursor: pointer;
        }
        .delete-btn:hover {
            color: #ff4d4d;
        }

        @media (min-width: 768px) {
            .logo { font-size: 48px; }
            .history-item { padding: 10px 20px; font-size: 14px; }
        }
    </style>
</head>
<body>

    <div class="logo">搜搜</div>

    <div class="search-container">
        <input type="text" class="search-input" id="searchInput" placeholder="在此栏搜索感兴趣的内容" autocomplete="off">
        <div class="history-dropdown" id="historyDropdown"></div>
    </div>

    <script>
        // 初始给出的搜索记录词条
        let searchHistory = [
            '完全忘记一个人是怎么回事？',
            '如何查找一个人的信息？',
            '缺少父爱的女生表现？',
           '开公司老板的学名'
        ];

        // 基础路由映射（不包含张卫国，张卫国由逻辑特殊渲染）
        const searchRoutes = {
            '完全忘记一个人是怎么回事？': 'result1.html',
            '如何查找一个人的信息？': 'result2.html',
            '缺少父爱的女生表现？': 'result3.html',
            '记忆孤岛': 'result4.html',
            '增力科技有限公司': 'result8.html',
             '张卫国':
 'result9.html',
            '开公司老板的学名':
'result10.html' 
       };

        // “张卫国”专属的三个内部结果配置
        const zwgResults = [
            { text: '张卫国（企业通 结果 1）', url: 'result5.html' },
            { text: '张卫国（相关的报道 结果2）', url: 'result6.html' },
            { text: '张卫国（直水市失信人员名单 结果 3）', url: 'result7.html' }
        ];

        const searchInput = document.getElementById('searchInput');
        const historyDropdown = document.getElementById('historyDropdown');

        // 核心渲染函数：会根据当前输入的内容智能切换显示“历史记录”或“张卫国的3个结果”
        function renderDropdown(keyword = '') {
            historyDropdown.innerHTML = '';
            const trimmed = keyword.trim();

            // 如果输入框里打字输入了“张卫国”
            if (trimmed === '张卫国 企业管理者 直水县') {
                // 直接渲染 3 个专属结果
                zwgResults.forEach((res) => {
                    const div = document.createElement('div');
                    div.className = 'history-item';
                    
                    // 创建一个结果小标签
                    const badge = document.createElement('span');
                    badge.className = 'result-badge';
                    badge.innerText = 'go'; 
                    
                    // 文本
                    const textSpan = document.createElement('span');
                    textSpan.innerText = res.text;
                    textSpan.style.flex = "1";
                    
                    // 组装并绑定跳转
                    div.appendChild(badge);
                    div.appendChild(textSpan);
                    div.onclick = () => {
                        window.location.href = res.url;
                    };
                    
                    historyDropdown.appendChild(div);
                });
                
                historyDropdown.style.display = 'block';
                return;
            }

            // 否则，默认渲染普通历史记录
            if (searchHistory.length === 0) {
                historyDropdown.style.display = 'none';
                return;
            }

            searchHistory.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'history-item';
                
                const textSpan = document.createElement('span');
                textSpan.innerText = item;
                textSpan.style.flex = "1";
                textSpan.onclick = () => {
                    searchInput.value = item;
                    triggerSearch(item);
                };

                const deleteSpan = document.createElement('span');
                deleteSpan.className = 'delete-btn';
                deleteSpan.innerText = '删除'; 
                deleteSpan.onclick = (e) => {
                    e.stopPropagation(); 
                    searchHistory.splice(index, 1);
                    renderDropdown(searchInput.value);
                    searchInput.focus();
                };

                div.appendChild(textSpan);
                div.appendChild(deleteSpan);
                historyDropdown.appendChild(div);
            });

            historyDropdown.style.display = 'block';
        }

        // 常规搜索触发逻辑
        function triggerSearch(query) {
            const trimmedQuery = query.trim();
            if (!trimmedQuery) return;
            
            // 如果手打回车也是“张卫国”，保持下拉框展开让用户选，不直接跳走
            if (trimmedQuery === '张卫国') {
                renderDropdown(trimmedQuery);
                return;
            }

            if (!searchHistory.includes(trimmedQuery)) {
                searchHistory.unshift(trimmedQuery);
            }

            if (searchRoutes[trimmedQuery]) {
                window.location.href = searchRoutes[trimmedQuery];
            } else {
                alert(`#: ${trimmedQuery}`);
                renderDropdown(trimmedQuery);
            }
        }

        // 监听输入框打字事件（实时监测是否输入了张卫国）
        searchInput.addEventListener('input', () => {
            renderDropdown(searchInput.value);
        });

        // 输入框获得焦点时显示
        searchInput.addEventListener('focus', () => {
            renderDropdown(searchInput.value);
        });

        // 点击页面其他地方隐藏下拉框
        document.addEventListener('click', (e) => {
            if (!searchInput.contains(e.target) && !historyDropdown.contains(e.target)) {
                historyDropdown.style.display = 'none';
            }
        });

        // 监听回车键
        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                triggerSearch(searchInput.value);
            }
        });
    </script>
</body>
</html>
