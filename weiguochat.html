<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>张卫国</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            display: flex;
            flex-direction: column;
            background-color: #f3f3f3; /* 微信聊天背景色 */
            color: #111111;
            user-select: none;
        }

        /* 微信聊天顶栏 */
        .nav-bar {
            height: 48px;
            background-color: #ededed;
            display: flex;
            align-items: center;
            padding: 0 16px;
            position: relative;
            border-bottom: 1px solid #e1e1e1;
            flex-shrink: 0;
        }

        .back-btn {
            display: flex;
            align-items: center;
            cursor: pointer;
            text-decoration: none;
            color: #111111;
            font-size: 16px;
        }

        .back-btn::before {
            content: "";
            display: inline-block;
            width: 12px;
            height: 12px;
            border-left: 2px solid #111111;
            border-bottom: 2px solid #111111;
            transform: rotate(45deg);
            margin-right: 6px;
        }

        /* 动态状态名字区域 */
        .nav-title {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 17px;
            font-weight: 500;
            text-align: center;
            width: 200px;
        }

        /* 微信对话滚动区域 */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* 单条消息包裹 */
        .msg-row {
            display: flex;
            align-items: flex-start;
            width: 100%;
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 对方消息样式 */
        .msg-left {
            justify-content: flex-start;
        }

        /* 头像样式（增加了鼠标小手和点击缩放效果） */
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 4px;
            object-fit: cover;
            margin-right: 10px;
            flex-shrink: 0;
            cursor: pointer;
        }
        .avatar:active {
            opacity: 0.8;
        }

        /* 微信标准聊天气泡 */
        .bubble {
            max-width: 70%;
            padding: 10px 14px;
            font-size: 16px;
            line-height: 1.4;
            border-radius: 4px;
            position: relative;
            word-wrap: break-word;
            word-break: break-all;
        }

        .bubble-left {
            background-color: #ffffff;
            color: #111111;
        }

        /* 气泡小尖角 */
        .bubble-left::before {
            content: "";
            position: absolute;
            top: 14px;
            left: -5px;
            border-width: 6px 6px 6px 0;
            border-style: solid;
            border-color: transparent #ffffff transparent transparent;
        }

        /* 微信底部模拟输入栏 */
        .input-bar {
            height: 56px;
            background-color: #f7f7f7;
            border-top: 1px solid #eaeaea;
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 12px;
            padding-bottom: env(safe-area-inset-bottom);
            flex-shrink: 0;
        }

        .input-icon {
            width: 28px;
            height: 28px;
            fill: #7f7f7f;
        }

        .fake-input {
            flex: 1;
            height: 38px;
            background-color: #ffffff;
            border-radius: 4px;
            border: 1px solid #e2e2e2;
            padding: 0 10px;
            color: #b2b2b2;
            font-size: 15px;
            display: flex;
            align-items: center;
        }
    </style>
</head>
<body>

    <!-- 顶栏 -->
    <div class="nav-bar">
        <a class="back-btn" href="微信.html"></a>
        <div id="navTitle" class="nav-title">张卫国</div>
    </div>

    <!-- 聊天主界面 -->
    <div id="chatContainer" class="chat-container"></div>

    <!-- 底部锁定输入栏 -->
    <div class="input-bar">
        <svg class="input-icon" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.42 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg>
        <div class="fake-input">对方状态异常，暂时无法发送消息...</div>
        <svg class="input-icon" viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5s.67 1.5 1.5 1.5zm3.5 4.5c1.94 0 3.61-1.44 4.15-3.32H7.85c.54 1.88 2.21 3.32 4.15 3.32z"/></svg>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const navTitle = document.getElementById('navTitle');

        // 张卫国的心理剧本台词
        const scriptData = [
            "你是谁？！谁让你加我这个号的？！",
            "说话啊！是不是那些催债的派你来的？",
            "还是说……你是高利贷那帮人换了新马甲来耍我？",
            "呵呵，别装了。我告诉你，不用逼了，明天开庭，我反正要进去了。",
            "钱？一分都没有！命有一条，他们想要就拿去！",
            "你大半夜突然通过我的微信号，怎么，连你也想在这个时候来看我的笑话吗？！",
            "围观一个快要坐牢的丧家之犬，是不是让你很有成就感？！"
        ];

        let currentStep = 0;

        // 顶栏状态动态切换（张卫国 <-> 对方正在输入...）
        function startTitleAnimation() {
            setInterval(() => {
                if (currentStep < scriptData.length) {
                    navTitle.textContent = navTitle.textContent === "张卫国" ? "对方正在输入..." : "张卫国";
                } else {
                    navTitle.textContent = "张卫国 (离线)";
                }
            }, 1500);
        }

        // 自动创建并插入微信聊天气泡
        function createMessageBubble(text) {
            const row = document.createElement('div');
            row.className = 'msg-row msg-left';

            // 头像元素
            const img = document.createElement('img');
            img.className = 'avatar';
            img.src = 'weiguo.jpg'; // 头像的图片源文件路径
            img.alt = '张卫国';

            // 💡 点击头像跳转到他的真实主页 weiguo2.html
            img.addEventListener('click', function() {
                window.location.href = 'weiguo2.html';
            });

            // 气泡元素
            const bubble = document.createElement('div');
            bubble.className = 'bubble bubble-left';
            bubble.textContent = text;

            row.appendChild(img);
            row.appendChild(bubble);
            chatContainer.appendChild(row);

            // 滚动到最底
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // 剧本控制（每3秒发一条）
        function runChatAnimation() {
            if (currentStep < scriptData.length) {
                navTitle.textContent = "对方正在输入...";
                
                setTimeout(() => {
                    createMessageBubble(scriptData[currentStep]);
                    currentStep++;
                    runChatAnimation();
                }, 3000);
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            startTitleAnimation();
            setTimeout(runChatAnimation, 1000);
        });
    </script>
</body>
</html>
