<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>感谢游玩</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
}

body{
background:#F8FBF4;
color:#55644D;
padding:35px 22px;
}

.container{
max-width:650px;
margin:auto;
text-align:center;
}

h1{
font-size:30px;
margin-bottom:18px;
color:#5D7652;
}

.text{
font-size:17px;
line-height:1.9;
margin-bottom:28px;
}

.gallery{
display:flex;
flex-direction:column;
gap:16px;
margin:30px 0;
}

.gallery img{
width:100%;
border-radius:14px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.egg{
margin-top:35px;
padding:18px;
background:#EEF7E6;
border-radius:12px;
font-size:15px;
line-height:1.8;
color:#6C7865;
}

.footer{
margin-top:30px;
font-size:13px;
color:#9AA494;
}

button{

margin-top:35px;

padding:14px 34px;

background:#DDEECB;

border:none;

border-radius:999px;

font-size:16px;

color:#55644D;

cursor:pointer;

}

button:active{

background:#CDE2B5;

}

</style>
</head>

<body>

<div class="container">

<h1>感谢游玩</h1>

<div class="text">
感谢你愿意陪她走完这段记忆。<br>
如果喜欢这个故事，欢迎继续关注我的作品。
</div>

<div class="gallery">

<img src="ad1.jpg">

<img src="ad2.jpg">

<img src="ad3.jpg">

</div>

<div class="egg">

<b>彩蛋</b><br><br>

如果现实中的你也曾经历过类似的事情，<br>
请不要忘记，<br>
总有人愿意倾听你的故事。

</div>

<div class="footer">

消失的牠<br>

Version 1.0

</div>

<button onclick="location.href='index.html'">

</button>
