<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>电话</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background-color: #ffffff;
            color: #000000;
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            user-select: none;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .display-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding: 24px;
            min-height: 120px;
        }
        .number-display {
            font-size: 36px;
            font-weight: 300;
            text-align: center;
            width: 100%;
            height: 48px;
            line-height: 48px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: clip;
            letter-spacing: 1px;
        }
        .keyboard-container {
            padding: 0 36px 20px 36px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .key-row {
            display: flex;
            justify-content: space-between;
            gap: 20px;
        }
        .key-btn {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background-color: #f2f2f7;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .key-btn:active { background-color: #e5e5ea; }
        .key-num { font-size: 30px; font-weight: 400; line-height: 1; color: #000000; }
        .key-sub { font-size: 10px; font-weight: 600; color: #8e8e93; margin-top: 2px; }
        .key-special { font-size: 36px; color: #000000; line-height: 1; padding-bottom: 6px; }
        .control-row {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            height: 80px;
            margin-top: 8px;
        }
        .call-btn {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background-color: #34c759;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(52, 199, 89, 0.3);
        }
        .call-btn:active { background-color: #249d43; }
        .call-icon { width: 28px; height: 28px; fill: #ffffff; }
        .backspace-btn {
            position: absolute;
            right: 48px;
            background: none;
            border: none;
            color: #8e8e93;
            cursor: pointer;
            padding: 12px;
            display: none;
        }
        .backspace-icon { width: 24px; height: 24px; fill: currentColor; }
    </style>
</head>
<body>

    <div class="display-container">
        <div id="numberDisplay" class="number-display"></div>
    </div>

    <div class="keyboard-container">
        <div class="key-row">
            <button class="key-btn" onclick="pressNum('1')"><span class="key-num">1</span><span class="key-sub">&nbsp;</span></button>
            <button class="key-btn" onclick="pressNum('2')"><span class="key-num">2</span><span class="key-sub">A B C</span></button>
            <button class="key-btn" onclick="pressNum('3')"><span class="key-num">3</span><span class="key-sub">D E F</span></button>
        </div>
        <div class="key-row">
            <button class="key-btn" onclick="pressNum('4')"><span class="key-num">4</span><span class="key-sub">G H I</span></button>
            <button class="key-btn" onclick="pressNum('5')"><span class="key-num">5</span><span class="key-sub">J K L</span></button>
            <button class="key-btn" onclick="pressNum('6')"><span class="key-num">6</span><span class="key-sub">M N O</span></button>
        </div>
        <div class="key-row">
            <button class="key-btn" onclick="pressNum('7')"><span class="key-num">7</span><span class="key-sub">P Q R S</span></button>
            <button class="key-btn" onclick="pressNum('8')"><span class="key-num">8</span><span class="key-sub">T U V</span></button>
            <button class="key-btn" onclick="pressNum('9')"><span class="key-num">9</span><span class="key-sub">W X Y Z</span></button>
        </div>
        <div class="key-row">
            <button class="key-btn" onclick="pressNum('*')"><span class="key-num key-special">*</span></button>
            <button class="key-btn" onclick="pressNum('0')"><span class="key-num">0</span><span class="key-sub">+</span></button>
            <button class="key-btn" onclick="pressNum('#')"><span class="key-num key-special">#</span></button>
        </div>
        <div class="control-row">
            <button class="call-btn" onclick="makeCall()">
                <svg class="call-icon" viewBox="0 0 24 24"><path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56a.977.977 0 0 0-1.01.24l-2.2 2.2c-2.83-1.44-5.15-3.75-6.59-6.59l2.2-2.21c.28-.26.36-.65.25-1C8.7 6.45 8.5 5.25 8.5 4c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1 0 9.39 7.61 17 17 17 .55 0 1-.45 1-1v-3.5c0-.55-.45-1-1-1z"/></svg>
            </button>
            <button class="backspace-btn" id="backspaceBtn" onclick="pressDelete()">
                <svg class="backspace-icon" viewBox="0 0 24 24"><path d="M22 3H7c-.69 0-1.23.35-1.59.88L0 12l5.41 8.11c.36.53.9.89 1.59.89h15c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-3 12.59L17.59 17 14 13.41 10.41 17 9 15.59 12.59 12 9 8.41 10.41 7 14 10.59 17.59 7 19 8.41 15.41 12 19 15.59z"/></svg>
            </button>
        </div>
    </div>

    <script>
        const display = document.getElementById('numberDisplay');
        const backspaceBtn = document.getElementById('backspaceBtn');
        let currentNumber = "";

        function pressNum(num) { currentNumber += num; updateDisplay(); }
        function pressDelete() { currentNumber = currentNumber.slice(0, -1); updateDisplay(); }
        function updateDisplay() {
            display.textContent = currentNumber;
            backspaceBtn.style.display = currentNumber.length > 0 ? 'block' : 'none';
        }

        function makeCall() {
            if (currentNumber.length === 0) return;
            const cleanNumber = currentNumber.replace(/[^0-9*#]/g, '');
            // 💡 核心改动：不再直接播放，而是把清洗后的号码作为URL参数传给 call.html
            window.location.href = `call.html?num=${cleanNumber}`;
        }
    </script>
</body>
</html>
